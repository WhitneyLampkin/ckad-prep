apiVersion: v1
kind: Namespace
metadata:
  name: frontend
  labels:
    team: frontend
---
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    team: payments
---
apiVersion: v1
kind: Namespace
metadata:
  name: ckad-exam
  labels:
    team: platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
        tier: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend-svc
  namespace: frontend
spec:
  selector:
    app: web-frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      serviceAccountName: app-sa
      containers:
      - name: api
        image: hashicorp/http-echo:1.0
        args:
        - "-text=payments-ok"
        - "-listen=:5678"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api-svc
  namespace: payments
spec:
  selector:
    app: payments-api
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-payments-ingress
  namespace: payments
spec:
  podSelector:
    matchLabels:
      app: payments-api
  policyTypes:
  - Ingress
  ingress: []
---
apiVersion: v1
kind: Pod
metadata:
  name: curl-client
  namespace: frontend
  labels:
    app: curl-client
    access: allowed
spec:
  containers:
  - name: curl
    image: curlimages/curl:8.8.0
    command:
    - sh
    - -c
    - sleep 3600
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ckad-exam
data:
  APP_MODE: practice
  LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: db-creds
  namespace: ckad-exam
type: Opaque
stringData:
  username: appuser
  password: s3cr3t!
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-data
  namespace: ckad-exam
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ckad-exam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: busybox:1.36
        command:
        - sh
        - -c
        - sleep 3600
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        volumeMounts:
        - name: shared-data
          mountPath: /data
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: shared-data
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup
  namespace: ckad-exam
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleaner
            image: busybox:1.36
            command:
            - sh
            - -c
            - echo cleanup complete
---
apiVersion: v1
kind: Pod
metadata:
  name: broken-shell
  namespace: ckad-exam
spec:
  containers:
  - name: broken
    image: busybox:1.36
    command:
    - sh
    - -c
    - sleep not-a-number
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: payments
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-sa-reader
  namespace: payments
subjects:
- kind: ServiceAccount
  name: app-sa
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
